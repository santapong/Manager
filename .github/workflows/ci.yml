name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: install · typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager"; passing it here too
      # makes action-setup error on the conflict (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Placeholders satisfy the Zod env gate; every page is dynamic so
          # nothing connects at build time.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci_placeholder
          AUTH_SECRET: ci-placeholder-secret-0123456789abcdef

      - name: Unit tests
        # No DATABASE_URL: DB-backed suites skip; pure suites still run.
        run: pnpm test
