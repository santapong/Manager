name: E2E

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: playwright smoke + rls
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      # Version comes from package.json "packageManager" — don't also pass it
      # here (action-setup errors on the conflict, ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @manager/web exec playwright install --with-deps chromium
      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_E2E }}
        run: pnpm --filter @manager/db db:migrate
      - name: Build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_E2E }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET_E2E }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: pnpm --filter @manager/web build
      - name: Run Playwright
        env:
          CI: "1"
          DATABASE_URL: ${{ secrets.DATABASE_URL_E2E }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET_E2E }}
          DEV_LOGIN_TOKEN: ${{ secrets.DEV_LOGIN_TOKEN_E2E }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: pnpm --filter @manager/web exec playwright test
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
